<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Adaugă Anunț - Rentix</title>
    <link rel="stylesheet" href="../css/style.css"> <link rel="stylesheet" href="../css/adauga.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="nav-container">
        <div class="logo">Rentix</div>
        <nav>
            <a href="index.html">Acasă</a>
        </nav>
    </div>
</header>

<div class="form-container">
    <h1>Adaugă un anunț nou</h1>
    <p>Completează detaliile de mai jos pentru a-ți publica oferta.</p>

    <form id="formAnunt">
        <div class="form-group">
            <label>Titlu Anunț</label>
            <input type="text" placeholder="Ex: Apartament 2 camere, Masina Bosch..." required>
        </div>

        <div class="form-group">
            <label>Tip Anunț</label>
            <div class="type-options">
                <label class="radio-card">
                    <input type="radio" name="tip" value="inchiriaza" checked onchange="toggleInchiriere(true)">
                    <div class="card-content">Închiriază</div>
                </label>
                <label class="radio-card">
                    <input type="radio" name="tip" value="vinde" onchange="toggleInchiriere(false)">
                    <div class="card-content">Vinde</div>
                </label>
            </div>
        </div>

        <div id="sectionInchiriere" class="form-row">
            <div class="form-group">
                <label>Durată maximă (zile)</label>
                <input type="number" placeholder="Ex: 30">
            </div>
            <div class="form-group">
                <label>Preț pe zi (RON)</label>
                <input type="number" placeholder="Ex: 100">
            </div>
        </div>

        <div id="sectionVanzare" class="form-group" style="display:none;">
            <label>Preț Total (RON)</label>
            <input type="number" placeholder="Ex: 5000">
        </div>

        <div class="form-group">
            <label>Descriere</label>
            <textarea rows="5" placeholder="Descrie produsul sau locuința în detaliu..."></textarea>
        </div>

        <div class="form-group">
            <label>Încarcă poze (minim 1)</label>
            <div class="image-upload" onclick="document.getElementById('fileInput').click()">
                <span>Apasă pentru a încărca imagini</span>
                <input type="file" id="fileInput" multiple hidden accept="image/*">
            </div>
        </div>

        <div class="form-group">
            <label>Locație (Google Maps)</label>
            <div id="map-placeholder">
                Aici va fi integrat Google Maps
            </div>
            <input type="text" placeholder="Introdu adresa exactă">
        </div>

        <button type="submit" class="btn-submit">Publică Anunțul</button>
    </form>
</div>

<script>
    function toggleInchiriere(isRental) {
        document.getElementById('sectionInchiriere').style.display = isRental ? 'flex' : 'none';
        document.getElementById('sectionVanzare').style.display = isRental ? 'none' : 'block';
    }
</script>
</body>
</html>
