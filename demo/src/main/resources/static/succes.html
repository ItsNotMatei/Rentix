<!DOCTYPE html>
<html>
<head>
    <title>Plata Rentix</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        #payment-form { width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; }
        button { margin-top: 20px; width: 100%; padding: 10px; background: #5469d4; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
<form id="payment-form">
    <div id="payment-element"></div>
    <button id="submit">Plătește Acum</button>
    <div id="payment-message" style="display:none;"></div>
</form>

<script>
    const stripe = Stripe('pk_test_AICI_PUI_CHEIA_PUBLICA'); // Incepe cu pk_test
    let elements;

    async function initialize() {
        // Cerem clientSecret de la backend-ul nostru Spring
        const response = await fetch("/api/payments/create-intent", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ amount: 10000, reservationId: 1 }), // 100.00 RON
        });
        const { clientSecret } = await response.json();

        elements = stripe.elements({ clientSecret });
        const paymentElement = elements.create("payment");
        paymentElement.mount("#payment-element");
    }

    document.querySelector("#payment-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const { error } = await stripe.confirmPayment({
            elements,
            confirmParams: { return_url: "http://localhost:8080/success.html" },
        });
        if (error) alert(error.message);
    });

    initialize();
</script>
</body>
</html>
