<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rentix</title>
    <link rel="stylesheet" href="../css/style.css"> <style>
    .login-container {
        max-width: 400px;
        margin: 100px auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        background: white;
        font-family: sans-serif;
    }
    .login-container h2 { text-align: center; color: #333; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; }
    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
    }
    .btn-login {
        width: 100%;
        padding: 12px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }
    .btn-login:hover { background-color: #218838; }
    .error-msg { color: red; font-size: 14px; display: none; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="login-container">
    <h2>Autentificare</h2>
    <div id="error-message" class="error-msg">Email sau parolă incorectă!</div>

    <form action="/login" method="POST">
        <div class="form-group">
            <label for="username">Email:</label>
            <input type="email" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">Parolă:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn-login">Intră în cont</button>
    </form>

    <p style="text-align: center; margin-top: 15px;">
        Nu ai cont? <a href="signup.html">Înregistrează-te</a>
    </p>
</div>

<script>
    // Verificăm dacă am fost redirecționați aici din cauza unei erori
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('error')) {
        document.getElementById('error-message').style.display = 'block';
    }
</script>

</body>
</html>
