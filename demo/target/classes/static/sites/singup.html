<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Înregistrare - Rentix</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 80px auto; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 8px; font-family: sans-serif; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>Creează un cont</h2>
    <form id="signupForm">
        <div class="input-group">
            <label>Nume complet:</label>
            <input type="text" id="nume" required>
        </div>
        <div class="input-group">
            <label>Email:</label>
            <input type="email" id="email" required>
        </div>
        <div class="input-group">
            <label>Parolă:</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn-submit">Înregistrare</button>
    </form>
</div>

<script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const userData = {
            nume: document.getElementById('nume').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        const response = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userData)
        });

        if (response.ok) {
            alert("Cont creat cu succes! Te poți loga.");
            window.location.href = "login.html";
        } else {
            alert("Eroare la înregistrare.");
        }
    });
</script>

</body>
</html>
