<!DOCTYPE html>
<html>
<head>
    <title>Availability Calendar</title>

    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css' rel='stylesheet' />

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>

    <style>
        body {
            font-family: Arial;
            padding: 30px;
        }

        #calendar {
            max-width: 900px;
            margin: auto;
        }
    </style>
</head>
<body>

<h1>Calendar Disponibilitate</h1>

<input type="number" id="anuntId" placeholder="Anunt ID">

<button onclick="loadCalendar()">
    Load Calendar
</button>

<div id='calendar'></div>

<script>

    async function loadCalendar() {

        const anuntId = document.getElementById("anuntId").value;

        const response = await fetch(
            `/reservations/availability/${anuntId}`
        );

        const dates = await response.json();

        const events = dates.map(date => ({
            title: 'Reserved',
            start: date,
            allDay: true
        }));

        const calendarEl = document.getElementById('calendar');

        calendarEl.innerHTML = "";

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            events: events
        });

        calendar.render();
    }
    const socket = new SockJS('/ws');
    const stompClient = Stomp.over(socket);

    stompClient.connect({}, function () {

        stompClient.subscribe('/topic/availability', function () {

            alert("Availability updated");
        });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</body>
</html>
