# .env: încărcat în DemoApplication.main() via dotenv-java (System.setProperty)
spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/rentix_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${RENTIX_DB_USER:root}
spring.datasource.password=${RENTIX_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

server.port=8080

spring.web.resources.static-locations=classpath:/static/

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration

rentix.jwt.secret=${RENTIX_JWT_SECRET}
rentix.jwt.access-expiration-ms=900000
rentix.jwt.refresh-expiration-ms=604800000

rentix.app.production=${RENTIX_APP_PRODUCTION:false}
rentix.cors.allowed-origins=${RENTIX_CORS_ALLOWED_ORIGINS:http://localhost:5173}
rentix.auth.cookie-same-site=Lax

rentix.stripe.secret-key=${STRIPE_SECRET_KEY:}
rentix.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
rentix.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
rentix.frontend.url=${FRONTEND_URL:http://localhost:5173}

rentix.data.cleanup-on-start=false

rentix.mail.from=${RENTIX_MAIL_FROM:rentix@oficial.com}
rentix.mail.enabled=${RENTIX_MAIL_ENABLED}
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
